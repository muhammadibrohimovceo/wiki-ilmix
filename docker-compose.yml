version: "3.9"

services:
  # ---------- Backend ----------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # If you have a Gemini API key, add it here so the real model is used.
      # GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------- Frontend ----------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_ROOT: http://backend:8000   # Docker‑internal hostname
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy